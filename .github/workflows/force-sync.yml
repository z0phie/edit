name: 1-Click Force Sync to Notion

on:
  workflow_dispatch: # This adds the "Run workflow" button

jobs:
  force-sync:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out all the files in your repo
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: Use the action you found to sync them
      - name: Push Markdown to Notion
        uses: JoshStern/push-md-to-notion@v0.3.0
        with:
          # This pulls the API key from your GitHub Secrets
          notion-api-key: ${{ secrets.NOTION_API_KEY }}

          # This pulls the Database ID from your GitHub Secrets
          notion-database-id: ${{ secrets.NOTION_DATABASE_ID }}

          # This tells the action to scan the ENTIRE repository for .md files
          md-file-path: "."

          # This is the name of the "Text" column in your Notion DB 
          # that stores the unique file path (e.g., "README.md")
          notion-page-id-property: "GitHub Path"
